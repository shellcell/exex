name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # required to upload release assets

jobs:
  release:
    name: build + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      # Cross-compile full + lite archives for every platform via the Makefile.
      - name: Build release archives
        run: make release VERSION="${GITHUB_REF_NAME}"

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Build distro packages (.deb/.rpm/.apk)
        run: make packages VERSION="${GITHUB_REF_NAME}"

      # Record this release's performance (all views, startup, memory) in the run
      # summary, measured against the native build of exex itself.
      - name: Performance report
        run: make perf-report

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          body_path: .github/release.md

  bump-tap:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew formula bump
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          gh api repos/shellcell/homebrew-tap/dispatches \
            -f event_type=bump-formula \
            -f 'client_payload[formula]=exex' \
            -f "client_payload[version]=${GITHUB_REF_NAME#v}"

  publish-packages:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger package repo publish
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          gh api repos/shellcell/packages/dispatches \
            -f event_type=publish-packages \
            -f "client_payload[project]=${GITHUB_REPOSITORY#*/}" \
            -f "client_payload[version]=${GITHUB_REF_NAME#v}"
